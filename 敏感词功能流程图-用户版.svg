<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2100" viewBox="0 0 1500 2100">
  <defs>
    <style>
      .title { font: 700 44px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .txt { font: 26px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .small { font: 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.5; }
      .decision { fill: #ffffff; stroke: #111827; stroke-width: 2.5; }
      .line { stroke: #111827; stroke-width: 2.5; fill: none; }
      .yesno { font: 20px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="2100" fill="#ffffff"/>
  <text x="750" y="70" text-anchor="middle" class="title">敏感词功能业务流程图（用户视角）</text>

  <rect class="box" x="260" y="120" width="980" height="80"/>
  <text x="750" y="170" text-anchor="middle" class="txt">1. 用户在聊天输入框中输入消息</text>

  <rect class="box" x="260" y="240" width="980" height="80"/>
  <text x="750" y="290" text-anchor="middle" class="txt">2. 用户点击发送消息</text>

  <rect class="box" x="260" y="360" width="980" height="80"/>
  <text x="750" y="410" text-anchor="middle" class="txt">3. 系统开始检查消息内容</text>

  <polygon class="decision" points="750,500 1020,560 750,620 480,560"/>
  <text x="750" y="570" text-anchor="middle" class="txt">4. 是否包含敏感词？</text>

  <rect class="box" x="90" y="710" width="500" height="110"/>
  <text x="340" y="760" text-anchor="middle" class="txt">否：消息保持原文</text>
  <text x="340" y="800" text-anchor="middle" class="small">直接进入发送流程</text>

  <rect class="box" x="900" y="710" width="500" height="120"/>
  <text x="1150" y="760" text-anchor="middle" class="txt">是：系统自动替换敏感词</text>
  <text x="1150" y="800" text-anchor="middle" class="small">例如替换为“***”</text>

  <rect class="box" x="900" y="880" width="500" height="90"/>
  <text x="1150" y="935" text-anchor="middle" class="txt">5. 生成处理后的消息内容</text>

  <rect class="box" x="760" y="1030" width="640" height="90"/>
  <text x="1080" y="1085" text-anchor="middle" class="txt">6. 系统发送处理后的消息到聊天界面</text>

  <rect class="box" x="760" y="1170" width="640" height="90"/>
  <text x="1080" y="1225" text-anchor="middle" class="txt">7. 其他用户收到并查看消息</text>

  <polygon class="decision" points="1080,1340 1310,1400 1080,1460 850,1400"/>
  <text x="1080" y="1410" text-anchor="middle" class="txt">8. 用户是否需要继续发送？</text>

  <rect class="box" x="700" y="1550" width="430" height="100"/>
  <text x="915" y="1600" text-anchor="middle" class="txt">否：结束本次会话流程</text>
  <text x="915" y="1635" text-anchor="middle" class="small">流程结束</text>

  <rect class="box" x="1160" y="1550" width="300" height="120"/>
  <text x="1310" y="1600" text-anchor="middle" class="txt">是：返回输入框</text>
  <text x="1310" y="1640" text-anchor="middle" class="small">继续输入下一条消息</text>

  <!-- 主干箭头 -->
  <line class="line" x1="750" y1="200" x2="750" y2="240"/>
  <line class="line" x1="750" y1="320" x2="750" y2="360"/>
  <line class="line" x1="750" y1="440" x2="750" y2="500"/>

  <!-- 敏感词判断 -->
  <path class="line" d="M750 620 L340 710"/>
  <text x="560" y="675" text-anchor="middle" class="yesno">否</text>

  <path class="line" d="M750 620 L1150 710"/>
  <text x="960" y="675" text-anchor="middle" class="yesno">是</text>

  <line class="line" x1="1150" y1="830" x2="1150" y2="880"/>
  <line class="line" x1="1150" y1="970" x2="1080" y2="1030"/>
  <line class="line" x1="340" y1="820" x2="1000" y2="1030"/>

  <line class="line" x1="1080" y1="1120" x2="1080" y2="1170"/>
  <line class="line" x1="1080" y1="1260" x2="1080" y2="1340"/>

  <!-- 继续发送判断 -->
  <path class="line" d="M1050 1460 L915 1550"/>
  <text x="980" y="1510" text-anchor="middle" class="yesno">否</text>

  <path class="line" d="M1110 1460 L1310 1550"/>
  <text x="1210" y="1510" text-anchor="middle" class="yesno">是</text>

  <!-- 返回循环 -->
  <path class="line" d="M1310 1670 C1450 1760, 1450 280, 1240 280"/>
  <text x="1420" y="970" text-anchor="middle" class="yesno">继续发送</text>
</svg>
