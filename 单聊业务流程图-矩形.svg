<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1900" viewBox="0 0 1400 1900">
  <defs>
    <style>
      .title { font: 700 44px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .txt { font: 26px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .small { font: 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.5; }
      .decision { fill: #ffffff; stroke: #111827; stroke-width: 2.5; }
      .line { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .yesno { font: 20px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1900" fill="#ffffff"/>
  <text x="700" y="70" text-anchor="middle" class="title">单聊业务流程图</text>

  <rect class="box" x="220" y="110" width="960" height="80"/>
  <text x="700" y="160" text-anchor="middle" class="txt">1. 用户A与用户B建立 WebSocket 连接</text>

  <rect class="box" x="220" y="230" width="960" height="80"/>
  <text x="700" y="280" text-anchor="middle" class="txt">2. 双方订阅个人通道 /user/{uid}/chat</text>

  <rect class="box" x="220" y="350" width="960" height="80"/>
  <text x="700" y="400" text-anchor="middle" class="txt">3. 用户A选择私聊对象B并输入消息</text>

  <rect class="box" x="220" y="470" width="960" height="110"/>
  <text x="700" y="520" text-anchor="middle" class="txt">4. 前端封装 MessageRO 并发送</text>
  <text x="700" y="560" text-anchor="middle" class="small">message + receiver=[A,B]</text>

  <rect class="box" x="220" y="620" width="960" height="80"/>
  <text x="700" y="670" text-anchor="middle" class="txt">5. STOMP 上行到 /chat</text>

  <rect class="box" x="220" y="740" width="960" height="80"/>
  <text x="700" y="790" text-anchor="middle" class="txt">6. XeChatController.sendToUser 接收请求</text>

  <polygon class="decision" points="700,840 940,900 700,960 460,900"/>
  <text x="700" y="910" text-anchor="middle" class="txt">7. 参数校验是否通过？</text>

  <rect class="box" x="110" y="1030" width="470" height="100"/>
  <text x="345" y="1080" text-anchor="middle" class="txt">校验失败</text>
  <text x="345" y="1115" text-anchor="middle" class="small">返回 /user/{A}/error</text>

  <rect class="box" x="820" y="1030" width="470" height="100"/>
  <text x="1055" y="1080" text-anchor="middle" class="txt">校验通过</text>
  <text x="1055" y="1115" text-anchor="middle" class="small">调用 sendMessageToUser</text>

  <rect class="box" x="820" y="1180" width="470" height="110"/>
  <text x="1055" y="1230" text-anchor="middle" class="txt">8. 服务端定向推送</text>
  <text x="1055" y="1270" text-anchor="middle" class="small">convertAndSendToUser(B, /chat, responseVO)</text>

  <rect class="box" x="820" y="1340" width="470" height="80"/>
  <text x="1055" y="1390" text-anchor="middle" class="txt">9. 用户B接收消息</text>

  <rect class="box" x="110" y="1510" width="520" height="100"/>
  <text x="370" y="1560" text-anchor="middle" class="txt">10a. 当前在与A会话</text>
  <text x="370" y="1595" text-anchor="middle" class="small">立即渲染到聊天窗口</text>

  <rect class="box" x="770" y="1510" width="520" height="100"/>
  <text x="1030" y="1560" text-anchor="middle" class="txt">10b. 当前不在与A会话</text>
  <text x="1030" y="1595" text-anchor="middle" class="small">缓存消息并未读+1</text>

  <line class="line" x1="700" y1="190" x2="700" y2="230"/>
  <line class="line" x1="700" y1="310" x2="700" y2="350"/>
  <line class="line" x1="700" y1="430" x2="700" y2="470"/>
  <line class="line" x1="700" y1="580" x2="700" y2="620"/>
  <line class="line" x1="700" y1="700" x2="700" y2="740"/>
  <line class="line" x1="700" y1="820" x2="700" y2="860"/>

  <path class="line" d="M700 960 L345 1030"/>
  <text x="510" y="995" text-anchor="middle" class="yesno">否</text>

  <path class="line" d="M700 960 L1055 1030"/>
  <text x="900" y="995" text-anchor="middle" class="yesno">是</text>

  <line class="line" x1="1055" y1="1130" x2="1055" y2="1180"/>
  <line class="line" x1="1055" y1="1290" x2="1055" y2="1340"/>
  <path class="line" d="M1055 1420 L370 1510"/>
  <line class="line" x1="1055" y1="1420" x2="1030" y2="1510"/>
</svg>
