<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1850" viewBox="0 0 1400 1850">
  <defs>
    <style>
      .title { font: 700 48px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .text { font: 28px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .small { font: 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 18; ry: 18; }
      .decision { fill: #eef2ff; stroke: #4338ca; stroke-width: 3; rx: 18; ry: 18; }
      .ok { fill: #ecfeff; stroke: #0e7490; stroke-width: 3; rx: 18; ry: 18; }
      .bad { fill: #fff1f2; stroke: #be123c; stroke-width: 3; rx: 18; ry: 18; }
      .line { stroke: #1e293b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1e293b"/>
    </marker>
  </defs>

  <text x="700" y="80" text-anchor="middle" class="title">群聊业务流程图</text>

  <rect class="box" x="200" y="130" width="1000" height="90"/>
  <text class="text" x="700" y="187" text-anchor="middle">1. 多个用户登录并建立 WebSocket 连接</text>

  <rect class="box" x="200" y="260" width="1000" height="90"/>
  <text class="text" x="700" y="317" text-anchor="middle">2. 客户端订阅群聊主题 /topic/chatRoom</text>

  <rect class="box" x="200" y="390" width="1000" height="90"/>
  <text class="text" x="700" y="447" text-anchor="middle">3. 用户A进入群聊大厅并输入消息</text>

  <rect class="box" x="200" y="520" width="1000" height="130"/>
  <text class="text" x="700" y="575" text-anchor="middle">4. 前端封装群聊消息并发送</text>
  <text class="small" x="700" y="620" text-anchor="middle">MessageRO：message/image（不带私聊receiver）</text>

  <rect class="box" x="200" y="690" width="1000" height="90"/>
  <text class="text" x="700" y="747" text-anchor="middle">5. STOMP 发送到服务端地址 /chatRoom</text>

  <rect class="box" x="200" y="820" width="1000" height="90"/>
  <text class="text" x="700" y="877" text-anchor="middle">6. XeChatController.chatRoom 接收请求</text>

  <rect class="decision" x="450" y="950" width="500" height="90"/>
  <text class="text" x="700" y="1007" text-anchor="middle">7. 参数校验是否通过？</text>

  <rect class="bad" x="120" y="1110" width="460" height="120"/>
  <text class="text" x="350" y="1165" text-anchor="middle">校验失败</text>
  <text class="small" x="350" y="1210" text-anchor="middle">返回错误到 /user/{A}/error</text>

  <rect class="ok" x="820" y="1110" width="460" height="120"/>
  <text class="text" x="1050" y="1165" text-anchor="middle">校验通过</text>
  <text class="small" x="1050" y="1210" text-anchor="middle">调用 sendMessage 广播</text>

  <rect class="box" x="820" y="1280" width="460" height="130"/>
  <text class="small" x="1050" y="1335" text-anchor="middle">8. 服务端广播推送</text>
  <text class="small" x="1050" y="1380" text-anchor="middle">convertAndSend(/topic/chatRoom, responseVO)</text>

  <rect class="box" x="820" y="1460" width="460" height="90"/>
  <text class="text" x="1050" y="1517" text-anchor="middle">9. 所有在线用户前端收到群聊消息</text>

  <rect class="ok" x="120" y="1620" width="520" height="130"/>
  <text class="text" x="380" y="1675" text-anchor="middle">10a. 当前在群聊会话</text>
  <text class="small" x="380" y="1720" text-anchor="middle">立即渲染到群聊窗口</text>

  <rect class="box" x="760" y="1620" width="520" height="130"/>
  <text class="text" x="1020" y="1675" text-anchor="middle">10b. 当前不在群聊会话</text>
  <text class="small" x="1020" y="1720" text-anchor="middle">写入群聊缓存并未读+1</text>

  <line class="line" x1="700" y1="220" x2="700" y2="260"/>
  <line class="line" x1="700" y1="350" x2="700" y2="390"/>
  <line class="line" x1="700" y1="480" x2="700" y2="520"/>
  <line class="line" x1="700" y1="650" x2="700" y2="690"/>
  <line class="line" x1="700" y1="780" x2="700" y2="820"/>
  <line class="line" x1="700" y1="910" x2="700" y2="950"/>

  <path class="line" d="M700 1040 L350 1110"/>
  <text class="small" x="500" y="1085" text-anchor="middle">否</text>

  <path class="line" d="M700 1040 L1050 1110"/>
  <text class="small" x="900" y="1085" text-anchor="middle">是</text>

  <line class="line" x1="1050" y1="1230" x2="1050" y2="1280"/>
  <line class="line" x1="1050" y1="1410" x2="1050" y2="1460"/>
  <path class="line" d="M1050 1550 L380 1620"/>
  <line class="line" x1="1050" y1="1550" x2="1020" y2="1620"/>
</svg>
