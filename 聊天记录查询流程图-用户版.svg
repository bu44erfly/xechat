<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2100" viewBox="0 0 1500 2100">
  <defs>
    <style>
      .title { font: 700 44px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .txt { font: 26px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .small { font: 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.5; }
      .decision { fill: #ffffff; stroke: #111827; stroke-width: 2.5; }
      .line { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .yesno { font: 20px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="2100" fill="#ffffff"/>
  <text x="750" y="70" text-anchor="middle" class="title">聊天记录查询业务流程图（用户视角）</text>

  <rect class="box" x="260" y="120" width="980" height="80"/>
  <text x="750" y="170" text-anchor="middle" class="txt">1. 用户在聊天页面点击“聊天记录”</text>

  <rect class="box" x="260" y="240" width="980" height="80"/>
  <text x="750" y="290" text-anchor="middle" class="txt">2. 页面打开记录查询窗口</text>

  <rect class="box" x="260" y="360" width="980" height="80"/>
  <text x="750" y="410" text-anchor="middle" class="txt">3. 用户输入关键词并点击查询</text>

  <polygon class="decision" points="750,500 1020,560 750,620 480,560"/>
  <text x="750" y="570" text-anchor="middle" class="txt">4. 关键词是否为空？</text>

  <rect class="box" x="90" y="710" width="500" height="100"/>
  <text x="340" y="760" text-anchor="middle" class="txt">为空：提示“请输入查询关键词”</text>
  <text x="340" y="795" text-anchor="middle" class="small">等待用户重新输入</text>

  <rect class="box" x="900" y="710" width="500" height="100"/>
  <text x="1150" y="760" text-anchor="middle" class="txt">不为空：系统开始检索聊天记录</text>
  <text x="1150" y="795" text-anchor="middle" class="small">按关键词匹配历史消息</text>

  <rect class="box" x="900" y="860" width="500" height="100"/>
  <text x="1150" y="910" text-anchor="middle" class="txt">5. 返回命中列表</text>
  <text x="1150" y="945" text-anchor="middle" class="small">显示行号、发送者、内容摘要</text>

  <polygon class="decision" points="1150,1040 1380,1100 1150,1160 920,1100"/>
  <text x="1150" y="1110" text-anchor="middle" class="txt">6. 是否有匹配结果？</text>

  <rect class="box" x="690" y="1260" width="430" height="100"/>
  <text x="905" y="1310" text-anchor="middle" class="txt">无结果：显示“未找到记录”</text>
  <text x="905" y="1345" text-anchor="middle" class="small">流程结束</text>

  <rect class="box" x="1160" y="1260" width="300" height="120"/>
  <text x="1310" y="1310" text-anchor="middle" class="txt">有结果：用户点击某条记录</text>
  <text x="1310" y="1350" text-anchor="middle" class="small">进入详情查看</text>

  <rect class="box" x="1030" y="1450" width="430" height="100"/>
  <text x="1245" y="1500" text-anchor="middle" class="txt">7. 页面展示完整聊天记录内容</text>
  <text x="1245" y="1535" text-anchor="middle" class="small">支持继续检索或关闭窗口</text>

  <rect class="box" x="560" y="1640" width="560" height="100"/>
  <text x="840" y="1690" text-anchor="middle" class="txt">8. 用户完成记录回看，返回聊天页面</text>
  <text x="840" y="1725" text-anchor="middle" class="small">流程结束</text>

  <line class="line" x1="750" y1="200" x2="750" y2="240"/>
  <line class="line" x1="750" y1="320" x2="750" y2="360"/>
  <line class="line" x1="750" y1="440" x2="750" y2="500"/>

  <path class="line" d="M750 620 L340 710"/>
  <text x="560" y="675" text-anchor="middle" class="yesno">是（空）</text>

  <path class="line" d="M750 620 L1150 710"/>
  <text x="960" y="675" text-anchor="middle" class="yesno">否</text>

  <line class="line" x1="1150" y1="810" x2="1150" y2="860"/>
  <line class="line" x1="1150" y1="960" x2="1150" y2="1040"/>

  <path class="line" d="M1120 1160 L905 1260"/>
  <text x="1010" y="1210" text-anchor="middle" class="yesno">否</text>

  <path class="line" d="M1180 1160 L1310 1260"/>
  <text x="1245" y="1210" text-anchor="middle" class="yesno">是</text>

  <line class="line" x1="1310" y1="1380" x2="1245" y2="1450"/>
  <line class="line" x1="1245" y1="1550" x2="980" y2="1640"/>
</svg>
